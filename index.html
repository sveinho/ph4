<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>File Format Knowledge Base</title>
  <!-- Kobler til det rene stilarket ditt -->
  <link rel="stylesheet" href="style.css">
  <!-- Henter den lokale filen i bakgrunnen uten å blokkere visningen -->
  <script src="markdown-it.min.js" defer></script>
  <script src="script.js" defer></script>
</head>
<body>

  <h1>Nice to know about file formats (PoC)</h1>

  <!-- Sentralt Søkefelt -->
  <div class="search-wrapper">
    <input type="text" id="searchInput" placeholder="Search formats by title or extension (e.g., PNG, .png)..." autocomplete="off">
    <button id="resetSearchBtn" class="invisible">✕</button>
  </div>
  
  <!-- Status og tilbakemelding -->
  <p id="searchCounter">Loading registry index...</p>
  
  <!-- Resultatbeholder med midlertidig Skeleton UI -->
  <div id="articlesContainer">
    <div class="skeleton-card">
      <div class="skeleton-title"></div>
      <div class="skeleton-meta"></div>
      <div class="skeleton-text"></div>
    </div>
    <div class="skeleton-card">
      <div class="skeleton-title"></div>
      <div class="skeleton-meta"></div>
      <div class="skeleton-text"></div>
    </div>
    <div class="skeleton-card">
      <div class="skeleton-title"></div>
      <div class="skeleton-meta"></div>
      <div class="skeleton-text"></div>
    </div>
  </div>
  
  <div id="noResults" class="hidden"><h3>No matching formats found.</h3></div>

  <!-- Beholder for "Last mer"-funksjonen -->
  <div id="loadMoreWrapper" class="hidden">
    <button id="loadMoreBtn">Load more formats</button>
  </div>

</body>
</html>
